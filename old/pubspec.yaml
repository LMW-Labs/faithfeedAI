name: faithfeed
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.1.1
  firebase_auth: ^6.1.0
  cloud_firestore: ^6.0.2
  firebase_storage: ^13.0.2
  firebase_app_check: ^0.4.1
  cloud_functions: ^6.0.3
  firebase_messaging: ^16.0.3
  flutter_local_notifications: ^18.0.1

  # Supabase (for Bible data & Strong's lexicon)
  supabase_flutter: ^2.9.3

  # Social Authentication
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.3
  flutter_facebook_auth: ^6.0.4

  # State Management
  provider: ^6.1.1

  # UI & Utilities
  flutter_svg: ^2.0.9
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.7.0
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  timeago: ^3.7.1
  share_plus: ^12.0.1
  video_player: ^2.8.2
  chewie: ^1.7.5
  file_picker: ^8.1.6
  flutter_tts: ^4.2.3
  audioplayers: ^6.5.1
  cloud_text_to_speech: ^1.1.3

  # OpenAI Voice (Realtime API + TTS)
  dart_openai: ^5.1.0          # OpenAI API client with TTS support
  web_socket_channel: ^3.0.2   # WebSocket for Realtime API
  just_audio: ^0.9.42          # High-quality audio playback with streaming
  youtube_player_flutter: ^9.1.3

  # Premium Icons & Components (Free)
  phosphor_flutter: ^2.1.0        # Modern icon set (9000+ icons)
  lucide_icons: ^0.257.0          # Alternative clean icons

  # UI Enhancement Packages
  shimmer: ^3.0.0                 # Loading skeleton effects
  flutter_animate: ^4.5.0         # Smooth animations & microinteractions
  glassmorphism: ^3.0.0           # Modern frosted glass effects
  flutter_staggered_animations: ^1.1.1  # List animations
  lottie: ^3.1.0                  # Animated icons & illustrations

  # Google & AI
  http: ^1.5.0
  googleapis_auth: ^2.0.0
  googleapis: ^15.0.0
  flutter_dotenv: ^6.0.0
  speech_to_text: ^7.3.0
  shared_preferences: ^2.2.2
  path_provider: ^2.1.4
  pdf: ^3.11.1
  printing: ^5.13.1

  # Create Post Features
  flutter_taggable: ^1.1.2
  geolocator: ^13.0.2
  tenor_flutter: ^0.0.4
  emoji_picker_flutter: ^4.4.0
  wakelock_plus: ^1.4.0
  url_launcher: ^6.2.2
  connectivity_plus: ^6.1.2

  # Flame Game Engine (for Exodus RPG)
  flame: ^1.18.0
  flame_audio: ^2.10.0
  flutter_markdown: ^0.7.1

  # Interactive Maps (for Bible geography)
  flutter_map: ^6.1.0
  latlong2: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.4

dependency_overrides:
  flutter_facebook_auth:
    path: third_party/flutter_facebook_auth

# The following section is specific to Flutter packages.
flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/images/
    - assets/fonts/
    - assets/games/exodus/
    - assets/games/exodus/sprites/
    - assets/games/exodus/data/
    - assets/text/
    - .env

  # To add custom fonts to your application, add a fonts section here.
  fonts:
    - family: Lora
      fonts:
        - asset: assets/fonts/Lora-Regular.ttf
        - asset: assets/fonts/Lora-Italic.ttf
          style: italic
        - asset: assets/fonts/Lora-Bold.ttf
          weight: 700

# Add this new section at the bottom of the file
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"

# Native splash screen configuration
# To update the splash screen:
# 1. Replace assets/images/splash_logo.png with your new image (Omega + "faithfeed" text in Urbanist font)
# 2. Run: flutter pub run flutter_native_splash:create
flutter_native_splash:
  color: "#131312"
  image: "assets/images/logo.png"
  android: true
  ios: true
  android_12:
    color: "#131312"
    image: "assets/images/logo.png"
